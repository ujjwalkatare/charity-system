<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>

    <link
      href="/static/vendor/bootstrap/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="/static/vendor/bootstrap-icons/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link href="/static/css/main.css" rel="stylesheet" />
  </head>

  <body class="login-page">
    <!-- SAME HEADER -->
    <header id="header" class="header fixed-top custom-header">
      <div
        class="container-fluid container-xl d-flex align-items-center justify-content-between"
      >
        <a href="/" class="logo d-flex align-items-center">
          <h1>Charity System</h1>
        </a>

        <nav id="navmenu" class="navmenu">
          <ul>
            <li><a href="/">Home</a></li>
          </ul>

          <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
        </nav>
      </div>
    </header>

    <!-- LOGIN SECTION -->
    <section class="auth-section">
      <div class="card auth-card">
        <div class="row g-0">
          <!-- Hide image automatically via CSS if you want -->
          <div class="col-md-6 auth-left">
            <img src="/static/img/login_page.png" alt="Login Image" />
          </div>

          <div class="col-md-6 auth-right">
            <h3 class="mb-4 text-center">Login</h3>

            <form action="/log_in" method="POST">
              {% csrf_token %}

              <div class="mb-3">
                <input
                  type="text"
                  name="username"
                  class="form-control"
                  placeholder="Username"
                  required
                />
              </div>

              <div class="mb-3">
                <input
                  type="password"
                  name="password"
                  class="form-control"
                  placeholder="Password"
                  required
                />
              </div>

              <button type="submit" class="btn btn-primary w-100">Login</button>
            </form>

            <div class="text-center mt-3">
              <a href="/donor_register">Register as Donor</a><br />
              <a href="/trust_register">Register as Trust</a>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="/static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
  </body>
</html>
