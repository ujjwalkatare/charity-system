<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Utilize Donation</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Dashboard CSS -->
    <link rel="stylesheet" href="/static/css/dashboard.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="dashboard-header">
      <i></i>
      Charity Blockchain System
    </header>

    <div class="dashboard-container">
      <!-- SIDEBAR -->
      <div class="sidebar">
        <h4>Trust Panel</h4>

        <ul>
          <li>
            <a href="{% url 'trust_dashboard' %}">
              <i></i>
              Dashboard
            </a>
          </li>

          <li>
            <a href="{% url 'trust_dashboard' %}">
              <i></i>
              Profile
            </a>
          </li>

          <li>
            <a href="{% url 'trust_dashboard' %}">
              <i></i>
              All Donors
            </a>
          </li>

          <li>
            <a class="active" href="{% url 'utilize_donation' %}">
              <i></i>
              Utilize Donation
            </a>
          </li>
           <li>
            <a href="{% url 'show_utilization' %}">
              <i ></i>
              Utilization History
            </a>
          </li>

          <li>
            <a href="{% url 'logout' %}">
              <i></i>
              Logout
            </a>
          </li>
        </ul>
      </div>

      <!-- MAIN CONTENT -->
      <div class="main-content >
        <h2 style="color: white; font-weight: 600">Fund Utilization</h2>

        <p style="color: #ff4a17" opacity: 0.8">
          Record how donated funds are used for charity activities.
        </p>

        <!-- BALANCE CARD -->

        <div class="ngo-card mt-4">
          <div class="ngo-accent"></div>

          <div class="p-3">
            <h5>Total Available Balance</h5>

            <h3 style="color: #ff4a17">₹ {{ balance }}</h3>
          </div>
        </div>

        <!-- UTILIZATION FORM -->

        <div class="ngo-card mt-4">
          <div class="ngo-accent"></div>

          <div class="p-4">
            <h5 class="mb-3">Utilize Donation</h5>

            <form method="POST" enctype="multipart/form-data">
              {% csrf_token %}

              <!-- Donation Select -->

              <div class="mb-3">
                <label class="form-label">Select Donation</label>

                <select name="tx_hash" class="form-control" required>
                  <option value="">Select Donation</option>

                  {% for d in received_donations %}

                  <option value="{{ d.donation_id }}">
                    {{ d.donor }} | ₹ {{ d.amount_inr }} | {{
                    d.tx_hash|slice:":10" }}...
                  </option>

                  {% endfor %}
                </select>
              </div>

              <!-- Amount -->

              <div class="mb-3">
                <label class="form-label">Amount Used (INR)</label>

                <input
                  type="number"
                  name="used_amt"
                  class="form-control"
                  required
                />
              </div>

              <!-- Category -->

              <div class="mb-3">
                <label class="form-label">Category</label>

                <select name="category" class="form-control">
                  <option>Medical</option>
                  <option>Food</option>
                  <option>Education</option>
                  <option>Disaster Relief</option>
                  <option>Other</option>
                </select>
              </div>

              <!-- Purpose -->

              <div class="mb-3">
                <label class="form-label">Purpose</label>

                <textarea
                  name="purpose"
                  class="form-control"
                  rows="3"
                ></textarea>
              </div>

              <!-- Proof Upload -->

              <div class="mb-3">
                <label class="form-label">Upload Proof (Bill / Image)</label>

                <input type="file" name="proof_image" class="form-control" />
              </div>

              <!-- Submit -->

              <button class="btn btn-danger">
                <i class="fas fa-save"></i>
                Record Utilization
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
